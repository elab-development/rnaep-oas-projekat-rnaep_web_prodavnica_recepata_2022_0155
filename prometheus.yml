global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:80']
    metrics_path: '/api/metrics'

  - job_name: 'catalog-service'
    static_configs:
      - targets: ['catalog-service:80']
    metrics_path: '/api/metrics'

  - job_name: 'ordering-service'
    static_configs:
      - targets: ['ordering-service:80']
    metrics_path: '/api/metrics'
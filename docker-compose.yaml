services:
  mysql-users:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_users_data:/var/lib/mysql
    networks:
      - recipe-net

  mysql-orders:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_orders_data:/var/lib/mysql
    networks:
      - recipe-net

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - recipe-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - recipe-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    networks:
      - recipe-net

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - kafka
    command: >
      bash -c "
      cub kafka-ready -b kafka:9092 1 60 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order-created --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory-updated --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic greska-pri-obradi --partitions 1 --replication-factor 1 &&
      "
    networks:
      - recipe-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
      - kafka-init
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - recipe-net

  user-service:
    build: ./user-service
    ports:
      - "8001:80"
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: ${USER_SERVICE_APP_KEY:-base64:YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=}
      DB_CONNECTION: mysql
      DB_HOST: mysql-users
      DB_PORT: 3306
      DB_DATABASE: users_db
      DB_USERNAME: root
      DB_PASSWORD: root
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - mysql-users
      - kafka-init
    networks:
      - recipe-net

  catalog-service:
    build: ./catalog-service
    ports:
      - "8002:80"
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: ${CATALOG_SERVICE_APP_KEY:-base64:YmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmI=}
      DB_CONNECTION: mongodb
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_DATABASE: catalog_db
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - mongodb
      - kafka-init
    networks:
      - recipe-net

  catalog-consumer:
    build: ./catalog-service
    command: php artisan kafka:consume-orders
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: ${CATALOG_SERVICE_APP_KEY:-base64:YmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmI=}
      DB_CONNECTION: mongodb
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_DATABASE: catalog_db
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - catalog-service
      - kafka-init
    networks:
      - recipe-net

  ordering-service:
    build: ./ordering-service
    ports:
      - "8003:80"
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: ${ORDERING_SERVICE_APP_KEY:-base64:Y2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2M=}
      DB_CONNECTION: mysql
      DB_HOST: mysql-orders
      DB_PORT: 3306
      DB_DATABASE: orders_db
      DB_USERNAME: root
      DB_PASSWORD: root
      KAFKA_BROKERS: kafka:9092
      CATALOG_SERVICE_URL: http://catalog-service/api
      USER_SERVICE_URL: http://user-service/api
    depends_on:
      - mysql-orders
      - kafka-init
    networks:
      - recipe-net

  ordering-consumer:
    build: ./ordering-service
    command: php artisan kafka:consume-inventory-events
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: ${ORDERING_SERVICE_APP_KEY:-base64:Y2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2M=}
      DB_CONNECTION: mysql
      DB_HOST: mysql-orders
      DB_PORT: 3306
      DB_DATABASE: orders_db
      DB_USERNAME: root
      DB_PASSWORD: root
      KAFKA_BROKERS: kafka:9092
      CATALOG_SERVICE_URL: http://catalog-service/api
    depends_on:
      - ordering-service
      - kafka-init
    networks:
      - recipe-net

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:80"
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: ${API_GATEWAY_APP_KEY:-base64:ZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGQ=}
      SESSION_DRIVER: file
      USER_SERVICE_URL: http://user-service/api
      CATALOG_SERVICE_URL: http://catalog-service/api
      ORDERING_SERVICE_URL: http://ordering-service/api
    depends_on:
      - user-service
      - catalog-service
      - ordering-service
    networks:
      - recipe-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recipesshop-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      VITE_API_URL: http://localhost:8000/api
    networks:
      - recipe-net

  phpmyadmin-users:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql-users
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql-users
    networks:
      - recipe-net

  phpmyadmin-orders:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql-orders
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql-orders
    networks:
      - recipe-net

  mongo-express:
    image: mongo-express:1.0.0
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongodb
    networks:
      - recipe-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - user-service
      - catalog-service
      - ordering-service
    networks:
      - recipe-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - recipe-net

volumes:
  mysql_users_data:
  mysql_orders_data:
  mongo_data:
  grafana_data:

networks:
  recipe-net:
    driver: bridge

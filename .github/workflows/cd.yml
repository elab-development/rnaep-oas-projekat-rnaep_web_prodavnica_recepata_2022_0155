name: CD - Publish Release Images

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build and Publish Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-user-service:${{ steps.tag.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-user-service:latest
      - name: Build and push catalog-service
        uses: docker/build-push-action@v5
        with:
          context: ./catalog-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-catalog-service:${{ steps.tag.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-catalog-service:latest
      - name: Build and push ordering-service
        uses: docker/build-push-action@v5
        with:
          context: ./ordering-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-ordering-service:${{ steps.tag.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-ordering-service:latest
      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-api-gateway:${{ steps.tag.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-api-gateway:latest
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-frontend:${{ steps.tag.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/recipe-frontend:latest
      - name: Release summary
        run: |
          echo "## Release ${{ steps.tag.outputs.VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Published images for user-service, catalog-service, ordering-service, api-gateway and frontend." >> "$GITHUB_STEP_SUMMARY"
